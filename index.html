<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criteoタグ設置状況確認ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f5f7fa;

<body>
  <div class="header">
    <h1>Criteoタグ設置状況確認ツール</h1>
    <p>サイトURLを入力すると、Criteoタグの設置状況を自動で確認します</p>
  </div>

  <div class="container">
    <div class="input-section">
      <label>確認したいサイトのURL</label>
      <div class="input-row">
        <input type="url" id="siteUrl" placeholder="https://example.co.jp" />
        <button class="btn" id="startBtn" onclick="startCrawl()">確認開始</button>
      </div>
      <div class="options-row">
        <label>クロール深度:
          <select id="maxDepth">
            <option value="1">1（TOPのリンク先のみ）</option>
            <option value="2" selected>2（2階層まで）</option>
            <option value="3">3（3階層まで）</option>
          </select>
        </label>
        <label>最大ページ数:
          <select id="maxPages">
            <option value="30">30</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </label>
      </div>
      <p class="cors-note">※ CORSプロキシ経由でHTMLを取得し、GTMコンテナJS内のCriteoタグも解析します。一部のサイトでは取得できない場合があります。</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="progress-section" id="progressSection">
      <strong>クロール中...</strong>
      <div class="progress-bar-wrapper">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0 ページ確認済み</div>
      <div class="progress-log" id="progressLog"></div>
    </div>

    <div class="result-section" id="resultSection">
      <h2>確認結果</h2>
      <div class="result-meta" id="resultMeta"></div>
      <table>
        <thead>
          <tr>
            <th style="width:160px">イベント</th>
            <th>説明</th>
            <th>設置URL パターン</th>
            <th style="width:90px">設置状況</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
      <button class="export-btn" onclick="exportCSV()">CSVダウンロード</button>
    </div>
  </div>

<script>
// Criteo event types
const CRITEO_EVENTS = [
  { key: 'vh', code: 'e=vh', name: 'viewHome', desc: 'トップページ閲覧' },
  { key: 'vl', code: 'e=vl', name: 'viewList', desc: '商品一覧ページ閲覧' },
  { key: 'vp', code: 'e=vp', name: 'viewProduct', desc: '商品詳細ページ閲覧' },
  { key: 'vb', code: 'e=vb', name: 'viewBasket', desc: 'カートページ閲覧' },
  { key: 'tc', code: 'e=tc', name: 'trackTransaction', desc: '購入完了ページ' },
];

// CORS proxies (fallback chain)
const CORS_PROXIES = [
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];

let currentProxyIndex = 0;
let aborted = false;

// Cache for GTM container analysis results
let gtmCriteoEvents = null; // Set of events found in GTM container
let gtmAnalyzed = false;
let gtmHasCriteo = false;

function getProxyUrl(url) {
  return CORS_PROXIES[currentProxyIndex](url);
}

async function fetchWithProxy(url) {
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    const idx = (currentProxyIndex + i) % CORS_PROXIES.length;
    try {
      const proxyUrl = CORS_PROXIES[idx](url);
      const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
      if (resp.ok) {
        currentProxyIndex = idx;
        return await resp.text();
      }
    } catch (e) {
      // try next proxy
    }
  }
  return null;
}

function log(msg) {
  const logEl = document.getElementById('progressLog');
  const div = document.createElement('div');
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function updateProgress(done, total) {
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} ページ確認済み`;
}

function extractLinks(html, baseUrl) {
  const links = new Set();
  const base = new URL(baseUrl);
  const hrefRegex = /href\s*=\s*["']([^"'#]+?)["']/gi;
  let match;
  while ((match = hrefRegex.exec(html)) !== null) {
    try {
      const resolved = new URL(match[1], baseUrl);
      if (resolved.hostname === base.hostname && (resolved.protocol === 'http:' || resolved.protocol === 'https:')) {
        resolved.hash = '';
        const clean = resolved.href.replace(/\/+$/, '') || resolved.origin;
        links.add(clean);
      }
    } catch (e) {}
  }
  return links;
}

// ===== GTM Container Analysis =====

function extractGtmIds(html) {
  const ids = new Set();
  // GTM script tag patterns
  const patterns = [
    /googletagmanager\.com\/gtm\.js\?id=(GTM-[A-Z0-9]+)/gi,
    /googletagmanager\.com\/gtag\/js\?id=(G-[A-Z0-9]+)/gi,
    /['"]?(GTM-[A-Z0-9]+)['"]?/g,
  ];
  for (const pat of patterns) {
    let m;
    while ((m = pat.exec(html)) !== null) {
      if (m[1].startsWith('GTM-')) {
        ids.add(m[1]);
      }
    }
  }
  return [...ids];
}

async function analyzeGtmContainer(gtmId) {
  log(`GTMコンテナ解析中: ${gtmId}`);
  const gtmUrl = `https://www.googletagmanager.com/gtm.js?id=${gtmId}`;
  const js = await fetchWithProxy(gtmUrl);
  if (!js) {
    log(`GTMコンテナ取得失敗: ${gtmId}`);
    return { hasCriteo: false, events: new Set() };
  }

  const hasCriteo = /criteo/i.test(js) ||
                    /static\.criteo\.net/i.test(js) ||
                    /ld\/ld\.js/i.test(js) ||
                    /criteo_q/i.test(js) ||
                    /cto_tms/i.test(js) ||
                    /cto_bundle/i.test(js);

  const events = new Set();
  if (hasCriteo) {
    log(`✓ GTM内にCriteoタグを検出: ${gtmId}`);

    // Detect event types inside GTM container JS
    const eventChecks = [
      { key: 'vh', patterns: [/viewHome/i, /view_home/i, /["']vh["']/] },
      { key: 'vl', patterns: [/viewList/i, /view_list/i, /viewCategory/i, /view_category/i, /["']vl["']/] },
      { key: 'vp', patterns: [/viewProduct/i, /view_product/i, /viewItem/i, /view_item/i, /["']vp["']/] },
      { key: 'vb', patterns: [/viewBasket/i, /view_basket/i, /viewCart/i, /view_cart/i, /["']vb["']/] },
      { key: 'tc', patterns: [/trackTransaction/i, /track_transaction/i, /["']tc["']/] },
    ];
    for (const ec of eventChecks) {
      for (const pat of ec.patterns) {
        if (pat.test(js)) {
          events.add(ec.key);
          break;
        }
      }
    }

    if (events.size > 0) {
      log(`  GTM内イベント: ${[...events].map(e => 'e=' + e).join(', ')}`);
    } else {
      log(`  GTM内にCriteo存在するがイベント種別は特定不可`);
    }
  }

  return { hasCriteo, events };
}

// ===== Criteo Detection (HTML + GTM combined) =====

function detectCriteoInHtml(html) {
  const result = { hasCriteo: false, events: new Set() };

  // Direct Criteo presence in HTML
  const hasCriteo = /criteo/i.test(html) ||
                    /ctag\.js/i.test(html) ||
                    /static\.criteo\.net/i.test(html) ||
                    /dynamic\.criteo\.net/i.test(html) ||
                    /criteo_q/i.test(html) ||
                    /cto_tms/i.test(html) ||
                    /cto_bundle/i.test(html) ||
                    /crto_/i.test(html) ||
                    /window\.criteo_q/i.test(html) ||
                    /criteo\.events/i.test(html);

  if (!hasCriteo) return result;
  result.hasCriteo = true;

  // Detect specific events in HTML
  const eventPatterns = [
    { key: 'vh', patterns: [/viewHome/i, /view_home/i, /["']event["']\s*:\s*["']vh["']/i, /setSiteType/i] },
    { key: 'vl', patterns: [/viewList/i, /view_list/i, /["']event["']\s*:\s*["']vl["']/i, /viewCategory/i, /view_category/i, /viewSearch/i] },
    { key: 'vp', patterns: [/viewProduct/i, /view_product/i, /["']event["']\s*:\s*["']vp["']/i, /viewItem/i, /view_item/i] },
    { key: 'vb', patterns: [/viewBasket/i, /view_basket/i, /["']event["']\s*:\s*["']vb["']/i, /viewCart/i, /view_cart/i] },
    { key: 'tc', patterns: [/trackTransaction/i, /track_transaction/i, /["']event["']\s*:\s*["']tc["']/i] },
  ];

  for (const ep of eventPatterns) {
    for (const pat of ep.patterns) {
      if (pat.test(html)) {
        result.events.add(ep.key);
        break;
      }
    }
  }

  return result;
}

function detectCriteoForPage(html) {
  // 1. Check HTML directly
  const htmlResult = detectCriteoInHtml(html);

  // 2. Merge with GTM results (already analyzed once for the whole site)
  const events = new Set([...htmlResult.events]);
  const hasCriteo = htmlResult.hasCriteo || gtmHasCriteo;

  // If GTM has Criteo but we can't determine per-page events from GTM alone,
  // we check if this page has the GTM container loaded
  if (gtmHasCriteo && !htmlResult.hasCriteo) {
    // Check if this page loads GTM at all
    const hasGtm = /googletagmanager\.com/i.test(html) || /gtag/i.test(html);
    if (hasGtm) {
      // GTM is on this page and GTM has Criteo → Criteo fires here
      // Add GTM-detected events
      for (const ev of gtmCriteoEvents) {
        events.add(ev);
      }
    }
  }

  // If HTML has Criteo directly AND GTM has additional events, merge
  if (htmlResult.hasCriteo && gtmHasCriteo) {
    for (const ev of gtmCriteoEvents) {
      events.add(ev);
    }
  }

  // If Criteo is present but no specific event, mark unknown
  if (hasCriteo && events.size === 0) {
    events.add('unknown');
  }

  return events;
}

// ===== URL Pattern Analysis =====

function findUrlPattern(urls, baseDomain) {
  if (urls.length === 0) return '—';
  if (urls.length === 1) return urls[0];

  const dirGroups = {};
  for (const url of urls) {
    try {
      const parsed = new URL(url);
      const segments = parsed.pathname.split('/').filter(Boolean);
      let key;
      if (segments.length === 0) {
        key = '/';
      } else if (segments.length === 1) {
        key = `/${segments[0]}/`;
      } else {
        key = `/${segments[0]}/${segments[1]}/`;
      }
      if (!dirGroups[key]) dirGroups[key] = [];
      dirGroups[key].push(url);
    } catch {
      if (!dirGroups['/']) dirGroups['/'] = [];
      dirGroups['/'].push(url);
    }
  }

  const patterns = [];
  for (const [dir, groupUrls] of Object.entries(dirGroups)) {
    if (dir === '/') {
      patterns.push(`${baseDomain}/`);
    } else {
      patterns.push(`${baseDomain}${dir} 配下`);
    }
  }

  return patterns.join('\n');
}

// ===== Main Crawl =====

async function startCrawl() {
  const urlInput = document.getElementById('siteUrl').value.trim();
  if (!urlInput) {
    showError('URLを入力してください');
    return;
  }

  let baseUrl;
  try {
    baseUrl = new URL(urlInput.startsWith('http') ? urlInput : 'https://' + urlInput);
  } catch {
    showError('有効なURLを入力してください');
    return;
  }

  const maxDepth = parseInt(document.getElementById('maxDepth').value);
  const maxPages = parseInt(document.getElementById('maxPages').value);

  // Reset state
  aborted = false;
  gtmCriteoEvents = new Set();
  gtmAnalyzed = false;
  gtmHasCriteo = false;

  // Reset UI
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '確認中...';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('progressSection').style.display = 'block';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('progressLog').innerHTML = '';
  updateProgress(0, 0);

  log(`クロール開始: ${baseUrl.origin}`);

  // Step 1: Fetch the top page first to find GTM IDs
  const startUrl = baseUrl.href.replace(/\/+$/, '') || baseUrl.origin;
  log(`取得中: ${startUrl}`);
  const topHtml = await fetchWithProxy(startUrl);

  if (!topHtml) {
    showError('サイトのHTMLを取得できませんでした。URLを確認してください。');
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').textContent = '確認開始';
    return;
  }

  // Step 2: Analyze GTM containers found in top page
  const gtmIds = extractGtmIds(topHtml);
  if (gtmIds.length > 0) {
    log(`GTMコンテナ検出: ${gtmIds.join(', ')}`);
    for (const gtmId of gtmIds) {
      const gtmResult = await analyzeGtmContainer(gtmId);
      if (gtmResult.hasCriteo) {
        gtmHasCriteo = true;
        for (const ev of gtmResult.events) {
          gtmCriteoEvents.add(ev);
        }
      }
    }
  } else {
    log('GTMコンテナは検出されませんでした（直接タグ設置を確認します）');
  }
  gtmAnalyzed = true;

  // Step 3: Crawl pages
  const visited = new Map();
  const queue = [{ url: startUrl, depth: 0, html: topHtml }];
  const seen = new Set([startUrl]);
  let processed = 0;

  // Process top page
  const topEvents = detectCriteoForPage(topHtml);
  visited.set(startUrl, { events: topEvents });
  if (topEvents.size > 0) {
    log(`✓ Criteoタグ検出: ${[...topEvents].map(e => e === 'unknown' ? 'その他' : 'e=' + e).join(', ')} @ ${startUrl}`);
  } else {
    log(`- タグなし: ${startUrl}`);
  }

  // Extract links from top page
  if (maxDepth > 0) {
    const links = extractLinks(topHtml, startUrl);
    for (const link of links) {
      if (!seen.has(link)) {
        seen.add(link);
        queue.push({ url: link, depth: 1 });
      }
    }
  }
  processed = 1;
  updateProgress(processed, processed + queue.length);

  // Process remaining pages
  while (queue.length > 0 && processed < maxPages && !aborted) {
    const item = queue.shift();
    if (item.html) { processed++; continue; } // already processed (top page)

    updateProgress(processed, processed + queue.length + 1);
    log(`取得中: ${item.url}`);

    const html = await fetchWithProxy(item.url);
    if (!html) {
      log(`取得失敗: ${item.url}`);
      processed++;
      continue;
    }

    const events = detectCriteoForPage(html);
    visited.set(item.url, { events });

    if (events.size > 0) {
      log(`✓ Criteoタグ検出: ${[...events].map(e => e === 'unknown' ? 'その他' : 'e=' + e).join(', ')} @ ${item.url}`);
    } else {
      log(`- タグなし: ${item.url}`);
    }

    if (item.depth < maxDepth) {
      const links = extractLinks(html, item.url);
      for (const link of links) {
        if (!seen.has(link) && seen.size < maxPages * 2) {
          seen.add(link);
          queue.push({ url: link, depth: item.depth + 1 });
        }
      }
    }

    processed++;
    updateProgress(processed, processed + queue.length);
    await new Promise(r => setTimeout(r, 300));
  }

  log(`クロール完了: ${processed} ページを確認`);
  if (gtmHasCriteo) {
    log(`※ GTMコンテナ経由でCriteoタグを検出しました`);
  }
  updateProgress(processed, processed);

  showResults(visited, baseUrl);

  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = '確認開始';
}

function showResults(visited, baseUrl) {
  const baseDomain = baseUrl.origin;

  // Group URLs by event type
  const eventUrls = {};
  for (const ev of CRITEO_EVENTS) {
    eventUrls[ev.key] = [];
  }
  eventUrls['unknown'] = [];

  for (const [url, data] of visited) {
    for (const ev of data.events) {
      if (eventUrls[ev]) {
        eventUrls[ev].push(url);
      }
    }
  }

  const tbody = document.getElementById('resultBody');
  tbody.innerHTML = '';

  for (const ev of CRITEO_EVENTS) {
    const urls = eventUrls[ev.key];
    const found = urls.length > 0;
    const pattern = found ? findUrlPattern(urls, baseDomain) : '—';

    const badgeClass = `badge-${ev.key}`;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <span class="event-badge ${badgeClass}">${ev.code}</span><br>
        <span style="font-size:12px;color:#888">${ev.name}</span>
      </td>
      <td>${ev.desc}</td>
      <td>
        <div class="url-pattern">${escapeHtml(pattern)}</div>
        ${found ? `
          <div class="url-list">
            <details>
              <summary>${urls.length}件のURL</summary>
              <ul>${urls.map(u => `<li>${escapeHtml(u)}</li>`).join('')}</ul>
            </details>
          </div>
        ` : ''}
      </td>
      <td class="${found ? 'tag-found' : 'tag-missing'}">${found ? '設置あり' : '設置なし'}</td>
    `;
    tbody.appendChild(tr);
  }

  // Add unknown if any
  if (eventUrls['unknown'].length > 0) {
    const urls = eventUrls['unknown'];
    const pattern = findUrlPattern(urls, baseDomain);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <span class="event-badge badge-other">その他</span><br>
        <span style="font-size:12px;color:#888">不明なイベント</span>
      </td>
      <td>Criteoタグは検出されたがイベント種別が特定できないもの</td>
      <td>
        <div class="url-pattern">${escapeHtml(pattern)}</div>
        <div class="url-list">
          <details>
            <summary>${urls.length}件のURL</summary>
            <ul>${urls.map(u => `<li>${escapeHtml(u)}</li>`).join('')}</ul>
          </details>
        </div>
      </td>
      <td class="tag-found">設置あり</td>
    `;
    tbody.appendChild(tr);
  }

  document.getElementById('resultMeta').textContent =
    `対象サイト: ${baseDomain} ｜ 確認ページ数: ${visited.size} ｜ 確認日時: ${new Date().toLocaleString('ja-JP')}`;
  document.getElementById('resultSection').style.display = 'block';
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function exportCSV() {
  const rows = [['イベント', 'イベント名', '説明', '設置URLパターン', '設置状況']];
  const tbody = document.getElementById('resultBody');
  for (const tr of tbody.querySelectorAll('tr')) {
    const cells = tr.querySelectorAll('td');
    const event = cells[0].textContent.trim().split('\n')[0].trim();
    const name = cells[0].textContent.trim().split('\n').pop().trim();
    const desc = cells[1].textContent.trim();
    const pattern = cells[2].querySelector('.url-pattern').textContent.trim();
    const status = cells[3].textContent.trim();
    rows.push([event, name, desc, pattern, status]);
  }

  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(c => `"${c.replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `criteo_tag_check_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// Allow Enter key to start
document.getElementById('siteUrl').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startCrawl();
});
</script>
