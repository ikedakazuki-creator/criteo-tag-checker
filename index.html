<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criteoタグ設置状況確認ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #ff6b00, #ff8c33);
      color: white;
      padding: 24px 32px;
      text-align: center;
    }
    .header h1 { font-size: 24px; font-weight: 700; }
    .header p { font-size: 14px; margin-top: 6px; opacity: 0.9; }
    .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }

    .input-section {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .input-section label {
      font-weight: 600;
      font-size: 14px;
      display: block;
      margin-bottom: 8px;
    }
    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #ff6b00; }
    .btn {
      padding: 10px 24px;
      background: #ff6b00;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #e55d00; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .options-row {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      font-size: 13px;
      color: #666;
      align-items: center;
    }
    .options-row label { font-weight: 400; margin-bottom: 0; }
    .options-row select {
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    .progress-section {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 24px;
      display: none;
    }
    .progress-bar-wrapper {
      background: #eee;
      border-radius: 8px;
      height: 8px;
      margin: 12px 0;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff6b00, #ff8c33);
      border-radius: 8px;
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text { font-size: 13px; color: #666; }
    .progress-log {
      margin-top: 12px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 12px;
      color: #888;
      font-family: monospace;
      background: #f8f8f8;
      padding: 8px 12px;
      border-radius: 6px;
    }
    .progress-log div { padding: 1px 0; }

    .result-section {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: none;
    }
    .result-section h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }
    .result-meta {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      background: #f0f0f0;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #ddd;
    }
    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }
    tbody tr:hover { background: #fafafa; }
    .tag-found { color: #16a34a; font-weight: 600; }
    .tag-missing { color: #dc2626; font-weight: 600; }
    .url-pattern {
      font-family: monospace;
      font-size: 13px;
      color: #555;
      word-break: break-all;
    }
    .url-list {
      margin-top: 4px;
      font-size: 12px;
      color: #999;
    }
    .url-list details summary {
      cursor: pointer;
      color: #ff6b00;
    }
    .url-list ul {
      list-style: none;
      padding-left: 8px;
      margin-top: 4px;
    }
    .url-list li {
      padding: 1px 0;
      word-break: break-all;
    }
    .event-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      font-family: monospace;
    }
    .badge-vh { background: #dbeafe; color: #1e40af; }
    .badge-vl { background: #fef3c7; color: #92400e; }
    .badge-vp { background: #d1fae5; color: #065f46; }
    .badge-vb { background: #fce7f3; color: #9d174d; }
    .badge-tc { background: #ede9fe; color: #5b21b6; }
    .badge-vpg { background: #e0f2fe; color: #0369a1; }
    .badge-vs { background: #fef9c3; color: #854d0e; }
    .badge-other { background: #f3f4f6; color: #374151; }

    .export-btn {
      margin-top: 16px;
      padding: 8px 16px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .export-btn:hover { background: #15803d; }

    .error-msg {
      background: #fef2f2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .cors-note {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Criteoタグ設置状況確認ツール</h1>
    <p>サイトURLを入力すると、Criteoタグの設置状況を自動で確認します</p>
  </div>

  <div class="container">
    <div class="input-section">
      <label>確認したいサイトのURL</label>
      <div class="input-row">
        <input type="url" id="siteUrl" placeholder="https://example.co.jp" />
        <button class="btn" id="startBtn" onclick="startCrawl()">確認開始</button>
      </div>
      <div class="options-row">
        <label>クロール深度:
          <select id="maxDepth">
            <option value="1" selected>1（TOPのリンク先のみ）</option>
            <option value="2">2（2階層まで）</option>
            <option value="3">3（3階層まで）</option>
          </select>
        </label>
        <label>最大ページ数:
          <select id="maxPages">
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </label>
      </div>
      <p class="cors-note">※ CORSプロキシ経由でHTMLを取得し、GTMコンテナJS内のCriteoタグも解析します。一部のサイトでは取得できない場合があります。</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="progress-section" id="progressSection">
      <strong>クロール中...</strong>
      <div class="progress-bar-wrapper">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0 ページ確認済み</div>
      <div class="progress-log" id="progressLog"></div>
    </div>

    <div class="result-section" id="resultSection">
      <h2>確認結果</h2>
      <div class="result-meta" id="resultMeta"></div>
      <table>
        <thead>
          <tr>
            <th style="width:160px">イベント</th>
            <th>説明</th>
            <th>設置URL パターン</th>
            <th style="width:90px">設置状況</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
      <button class="export-btn" onclick="exportCSV()">CSVダウンロード</button>
    </div>
  </div>

<script>
// Criteo event types
const CRITEO_EVENTS = [
  { key: 'vh',  code: 'e=vh',  name: 'viewHome',         desc: 'トップページ閲覧' },
  { key: 'vl',  code: 'e=vl',  name: 'viewList',         desc: '商品一覧ページ閲覧' },
  { key: 'vp',  code: 'e=vp',  name: 'viewProduct',      desc: '商品詳細ページ閲覧' },
  { key: 'vb',  code: 'e=vb',  name: 'viewBasket',       desc: 'カートページ閲覧' },
  { key: 'tc',  code: 'e=tc',  name: 'trackTransaction',  desc: '購入完了ページ' },
  { key: 'vpg', code: 'e=vpg', name: 'viewPage',         desc: '汎用ページ閲覧' },
  { key: 'vs',  code: 'e=vs',  name: 'viewSearch',       desc: '検索結果ページ' },
];

// CORS proxies (fallback chain)
const CORS_PROXIES = [
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];

let currentProxyIndex = 0;
let aborted = false;

// GTM analysis results
let gtmTagRules = []; // [{ events: Set, urlPatterns: [] }]
let gtmAnalyzed = false;
let gtmHasCriteo = false;

function getProxyUrl(url) {
  return CORS_PROXIES[currentProxyIndex](url);
}

async function fetchWithProxy(url) {
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    const idx = (currentProxyIndex + i) % CORS_PROXIES.length;
    try {
      const proxyUrl = CORS_PROXIES[idx](url);
      const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
      if (resp.ok) {
        currentProxyIndex = idx;
        return await resp.text();
      }
    } catch (e) {
      // try next proxy
    }
  }
  return null;
}

function log(msg) {
  const logEl = document.getElementById('progressLog');
  const div = document.createElement('div');
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function updateProgress(done, total) {
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} ページ確認済み`;
}

// Skip non-HTML extensions
const SKIP_EXT = /\.(jpg|jpeg|png|gif|svg|webp|ico|css|js|pdf|zip|xml|json|woff2?|ttf|eot|mp4|mp3|avi|mov|doc|docx|xls|xlsx|ppt|pptx|csv|txt|rss|atom)(\?|$)/i;

function extractLinks(html, baseUrl) {
  const links = new Set();
  const base = new URL(baseUrl);
  const hrefRegex = /href\s*=\s*["']([^"'#]+?)["']/gi;
  let match;
  while ((match = hrefRegex.exec(html)) !== null) {
    try {
      const resolved = new URL(match[1], baseUrl);
      if (resolved.hostname === base.hostname && (resolved.protocol === 'http:' || resolved.protocol === 'https:')) {
        // Skip non-HTML resources
        if (SKIP_EXT.test(resolved.pathname)) continue;
        resolved.hash = '';
        resolved.search = ''; // Remove query params to reduce duplicates
        const clean = resolved.href.replace(/\/+$/, '') || resolved.origin;
        links.add(clean);
      }
    } catch (e) {}
  }
  return links;
}

// ===== GTM Container Analysis =====

function extractGtmIds(html) {
  const ids = new Set();
  const patterns = [
    /googletagmanager\.com\/gtm\.js\?id=(GTM-[A-Z0-9]+)/gi,
    /googletagmanager\.com\/gtag\/js\?id=(G-[A-Z0-9]+)/gi,
    /['"]?(GTM-[A-Z0-9]+)['"]?/g,
  ];
  for (const pat of patterns) {
    let m;
    while ((m = pat.exec(html)) !== null) {
      if (m[1].startsWith('GTM-')) ids.add(m[1]);
    }
  }
  return [...ids];
}

// Event detection patterns (shared between GTM and HTML analysis)
const EVENT_DETECT = [
  { key: 'vh',  patterns: [/viewHome/i, /view_home/i, /["']vh["']/] },
  { key: 'vl',  patterns: [/viewList/i, /view_list/i, /viewCategory/i, /view_category/i, /["']vl["']/] },
  { key: 'vp',  patterns: [/viewProduct/i, /view_product/i, /viewItem/i, /view_item/i, /["']vp["']/] },
  { key: 'vb',  patterns: [/viewBasket/i, /view_basket/i, /viewCart/i, /view_cart/i, /["']vb["']/] },
  { key: 'tc',  patterns: [/trackTransaction/i, /track_transaction/i, /["']tc["']/] },
  { key: 'vpg', patterns: [/viewPage/i, /view_page/i, /["']vpg["']/] },
  { key: 'vs',  patterns: [/viewSearch(?!R)/i, /view_search/i, /["']vs["']/] },
];

function detectEventsInText(text) {
  const events = new Set();
  for (const ed of EVENT_DETECT) {
    for (const pat of ed.patterns) {
      if (pat.test(text)) { events.add(ed.key); break; }
    }
  }
  return events;
}

// GTM container → extract Criteo tag blocks with their trigger URL rules
// Returns: { hasCriteo, tagRules: [{ events: Set, urlPatterns: [regex|string] }] }
async function analyzeGtmContainer(gtmId) {
  log(`GTMコンテナ解析中: ${gtmId}`);
  const gtmUrl = `https://www.googletagmanager.com/gtm.js?id=${gtmId}`;
  const js = await fetchWithProxy(gtmUrl);
  if (!js) {
    log(`GTMコンテナ取得失敗: ${gtmId}`);
    return { hasCriteo: false, tagRules: [] };
  }

  const hasCriteo = /criteo/i.test(js) || /static\.criteo\.net/i.test(js) ||
                    /ld\/ld\.js/i.test(js) || /criteo_q/i.test(js) ||
                    /cto_tms/i.test(js) || /cto_bundle/i.test(js);

  if (!hasCriteo) {
    log(`  GTM内にCriteoタグなし: ${gtmId}`);
    return { hasCriteo: false, tagRules: [] };
  }

  log(`✓ GTM内にCriteoタグを検出: ${gtmId}`);

  // Try to extract Custom HTML tag blocks containing Criteo
  // GTM uses escaped HTML in vtp_html fields: \\u003Cscript\\u003E ... \\u003C/script\\u003E
  const tagRules = [];

  // Strategy 1: Find vtp_html blocks that mention criteo
  // These are Custom HTML tags in GTM
  const htmlBlockRegex = /vtp_html\s*:\s*["']([^"']*criteo[^"']*)["']/gi;
  let blockMatch;
  while ((blockMatch = htmlBlockRegex.exec(js)) !== null) {
    const block = decodeGtmString(blockMatch[1]);
    const events = detectEventsInText(block);
    if (events.size > 0) {
      tagRules.push({ events, urlPatterns: [], source: 'vtp_html' });
    }
  }

  // Strategy 2: Look for larger escaped HTML sections with criteo
  // GTM often has HTML like: \u003Cscript\u003E\nwindow.criteo_q...
  const escapedBlockRegex = /(\\u003[Cc]script\\u003[Ee][^]*?\\u003[Cc]\/script\\u003[Ee])/g;
  let escMatch;
  while ((escMatch = escapedBlockRegex.exec(js)) !== null) {
    const decoded = decodeGtmString(escMatch[1]);
    if (/criteo/i.test(decoded)) {
      const events = detectEventsInText(decoded);
      if (events.size > 0) {
        // Avoid duplicates
        const evKey = [...events].sort().join(',');
        const exists = tagRules.some(r => [...r.events].sort().join(',') === evKey);
        if (!exists) {
          tagRules.push({ events, urlPatterns: [], source: 'escaped_html' });
        }
      }
    }
  }

  // Strategy 3: If no specific blocks found, detect events from entire GTM JS
  if (tagRules.length === 0) {
    const allEvents = detectEventsInText(js);
    if (allEvents.size > 0) {
      tagRules.push({ events: allEvents, urlPatterns: [], source: 'global' });
    }
  }

  // Try to extract URL trigger patterns from GTM
  // Look for URL matching predicates: patterns like ["_re","_u","/pattern/"]
  const urlTriggerRegex = /["']_(?:re|cn|eq|sw|ew)["']\s*,\s*["']_u["']\s*,\s*["']([^"']+)["']/g;
  let trigMatch;
  const urlTriggers = [];
  while ((trigMatch = urlTriggerRegex.exec(js)) !== null) {
    urlTriggers.push(trigMatch[1]);
  }
  // Also look for URL patterns in other formats
  const urlPatRegex2 = /["'](?:pageUrl|Page URL|url|page_path)["']\s*[,:]\s*["']([^"']+)["']/gi;
  while ((trigMatch = urlPatRegex2.exec(js)) !== null) {
    if (trigMatch[1].length > 1 && trigMatch[1].startsWith('/')) {
      urlTriggers.push(trigMatch[1]);
    }
  }

  if (tagRules.length > 0) {
    const allEvs = new Set();
    tagRules.forEach(r => r.events.forEach(e => allEvs.add(e)));
    log(`  GTM内イベント: ${[...allEvs].map(e => 'e=' + e).join(', ')}`);
    if (urlTriggers.length > 0) {
      log(`  GTM内URLトリガー: ${urlTriggers.length}件検出`);
    }
  }

  return { hasCriteo, tagRules };
}

function decodeGtmString(str) {
  return str
    .replace(/\\u003C/gi, '<').replace(/\\u003E/gi, '>')
    .replace(/\\u0026/gi, '&').replace(/\\u0022/gi, '"')
    .replace(/\\u0027/gi, "'").replace(/\\n/g, '\n')
    .replace(/\\\\/g, '\\');
}

// ===== Per-page Criteo Detection =====

function detectCriteoForPage(html, pageUrl) {
  const events = new Set();

  // 1. Direct Criteo in page HTML (criteo_q.push, dataLayer, inline scripts)
  const hasCriteoDirect = /criteo/i.test(html) || /ctag\.js/i.test(html) ||
    /static\.criteo\.net/i.test(html) || /dynamic\.criteo\.net/i.test(html) ||
    /criteo_q/i.test(html) || /cto_tms/i.test(html) || /cto_bundle/i.test(html) ||
    /crto_/i.test(html);

  if (hasCriteoDirect) {
    // Detect specific events from page HTML
    for (const ev of detectEventsInText(html)) {
      events.add(ev);
    }
  }

  // 2. GTM-based detection: check each GTM Criteo tag rule
  if (gtmHasCriteo && gtmTagRules.length > 0) {
    const hasGtmOnPage = /googletagmanager\.com/i.test(html);
    if (hasGtmOnPage) {
      // Check page's dataLayer for Criteo-specific events
      // e.g. dataLayer.push({'event': 'criteo_viewProduct', ...})
      const dlPushes = html.match(/dataLayer\.push\s*\(\s*\{[^}]*\}/g) || [];
      for (const push of dlPushes) {
        if (/criteo/i.test(push)) {
          for (const ev of detectEventsInText(push)) {
            events.add(ev);
          }
        }
      }

      // Check criteo_q pushes on the page
      const criteoQPushes = html.match(/criteo_q\.push\s*\([^)]*\)/g) || [];
      for (const push of criteoQPushes) {
        for (const ev of detectEventsInText(push)) {
          events.add(ev);
        }
      }

      // Check inline script blocks for Criteo event data
      const scriptBlocks = html.match(/<script[^>]*>[\s\S]*?<\/script>/gi) || [];
      for (const block of scriptBlocks) {
        if (/criteo/i.test(block) || /cto_/i.test(block)) {
          for (const ev of detectEventsInText(block)) {
            events.add(ev);
          }
        }
      }

      // If we still found nothing from page HTML, try matching GTM tag rules
      // against this page's URL
      if (events.size === 0) {
        for (const rule of gtmTagRules) {
          if (rule.urlPatterns && rule.urlPatterns.length > 0) {
            for (const pat of rule.urlPatterns) {
              try {
                if (new RegExp(pat, 'i').test(pageUrl)) {
                  for (const ev of rule.events) events.add(ev);
                }
              } catch { /* invalid regex */ }
            }
          }
        }
      }

      // Last resort: if GTM has Criteo and page has GTM, but we can't
      // determine specific event → mark as 'unknown' (not all events!)
      if (events.size === 0) {
        events.add('unknown');
      }
    }
  }

  return events;
}

// ===== URL Pattern Analysis =====

function findUrlPattern(urls, baseDomain) {
  if (urls.length === 0) return '—';
  if (urls.length === 1) return urls[0];

  const dirGroups = {};
  for (const url of urls) {
    try {
      const parsed = new URL(url);
      const segments = parsed.pathname.split('/').filter(Boolean);
      // Group by FIRST path segment only (e.g. /category/ 配下)
      const key = segments.length === 0 ? '/' : `/${segments[0]}/`;
      if (!dirGroups[key]) dirGroups[key] = [];
      dirGroups[key].push(url);
    } catch {
      if (!dirGroups['/']) dirGroups['/'] = [];
      dirGroups['/'].push(url);
    }
  }

  const patterns = [];
  for (const [dir, groupUrls] of Object.entries(dirGroups)) {
    if (dir === '/') {
      patterns.push(`${baseDomain}/`);
    } else {
      patterns.push(`${baseDomain}${dir} 配下`);
    }
  }

  return patterns.join('\n');
}

// ===== Main Crawl =====

async function startCrawl() {
  const urlInput = document.getElementById('siteUrl').value.trim();
  if (!urlInput) {
    showError('URLを入力してください');
    return;
  }

  let baseUrl;
  try {
    baseUrl = new URL(urlInput.startsWith('http') ? urlInput : 'https://' + urlInput);
  } catch {
    showError('有効なURLを入力してください');
    return;
  }

  const maxDepth = parseInt(document.getElementById('maxDepth').value);
  const maxPages = parseInt(document.getElementById('maxPages').value);

  // Reset state
  aborted = false;
  gtmTagRules = [];
  gtmAnalyzed = false;
  gtmHasCriteo = false;

  // Reset UI
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '確認中...';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('progressSection').style.display = 'block';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('progressLog').innerHTML = '';
  updateProgress(0, 0);

  log(`クロール開始: ${baseUrl.origin}`);

  // Step 1: Fetch the top page first to find GTM IDs
  const startUrl = baseUrl.href.replace(/\/+$/, '') || baseUrl.origin;
  log(`取得中: ${startUrl}`);
  const topHtml = await fetchWithProxy(startUrl);

  if (!topHtml) {
    showError('サイトのHTMLを取得できませんでした。URLを確認してください。');
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').textContent = '確認開始';
    return;
  }

  // Step 2: Analyze GTM containers found in top page
  const gtmIds = extractGtmIds(topHtml);
  if (gtmIds.length > 0) {
    log(`GTMコンテナ検出: ${gtmIds.join(', ')}`);
    for (const gtmId of gtmIds) {
      const gtmResult = await analyzeGtmContainer(gtmId);
      if (gtmResult.hasCriteo) {
        gtmHasCriteo = true;
        gtmTagRules.push(...gtmResult.tagRules);
      }
    }
  } else {
    log('GTMコンテナは検出されませんでした（直接タグ設置を確認します）');
  }
  gtmAnalyzed = true;

  // Step 3: Crawl pages
  const visited = new Map();
  const queue = [{ url: startUrl, depth: 0, html: topHtml }];
  const seen = new Set([startUrl]);
  let processed = 0;

  // Process top page
  const topEvents = detectCriteoForPage(topHtml, startUrl);
  visited.set(startUrl, { events: topEvents });
  if (topEvents.size > 0) {
    log(`✓ Criteoタグ検出: ${[...topEvents].map(e => e === 'unknown' ? 'その他' : 'e=' + e).join(', ')} @ ${startUrl}`);
  } else {
    log(`- タグなし: ${startUrl}`);
  }

  // Extract links from top page
  if (maxDepth > 0) {
    const links = extractLinks(topHtml, startUrl);
    for (const link of links) {
      if (!seen.has(link)) {
        seen.add(link);
        queue.push({ url: link, depth: 1 });
      }
    }
  }
  processed = 1;
  updateProgress(processed, processed + queue.length);

  // Process remaining pages
  while (queue.length > 0 && processed < maxPages && !aborted) {
    const item = queue.shift();
    if (item.html) { processed++; continue; } // already processed (top page)

    updateProgress(processed, processed + queue.length + 1);
    log(`取得中: ${item.url}`);

    const html = await fetchWithProxy(item.url);
    if (!html) {
      log(`取得失敗: ${item.url}`);
      processed++;
      continue;
    }

    const events = detectCriteoForPage(html, item.url);
    visited.set(item.url, { events });

    if (events.size > 0) {
      log(`✓ Criteoタグ検出: ${[...events].map(e => e === 'unknown' ? 'その他' : 'e=' + e).join(', ')} @ ${item.url}`);
    } else {
      log(`- タグなし: ${item.url}`);
    }

    if (item.depth < maxDepth) {
      const links = extractLinks(html, item.url);
      for (const link of links) {
        if (!seen.has(link) && seen.size < maxPages * 2) {
          seen.add(link);
          queue.push({ url: link, depth: item.depth + 1 });
        }
      }
    }

    processed++;
    updateProgress(processed, processed + queue.length);
    await new Promise(r => setTimeout(r, 300));
  }

  log(`クロール完了: ${processed} ページを確認`);
  if (gtmHasCriteo) {
    log(`※ GTMコンテナ経由でCriteoタグを検出しました`);
  }
  updateProgress(processed, processed);

  showResults(visited, baseUrl);

  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = '確認開始';
}

function showResults(visited, baseUrl) {
  const baseDomain = baseUrl.origin;

  // Group URLs by event type
  const eventUrls = {};
  for (const ev of CRITEO_EVENTS) {
    eventUrls[ev.key] = [];
  }
  eventUrls['unknown'] = [];

  for (const [url, data] of visited) {
    for (const ev of data.events) {
      if (eventUrls[ev]) {
        eventUrls[ev].push(url);
      }
    }
  }

  const tbody = document.getElementById('resultBody');
  tbody.innerHTML = '';

  for (const ev of CRITEO_EVENTS) {
    const urls = eventUrls[ev.key];
    const found = urls.length > 0;
    const pattern = found ? findUrlPattern(urls, baseDomain) : '—';

    const badgeClass = `badge-${ev.key}`;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <span class="event-badge ${badgeClass}">${ev.code}</span><br>
        <span style="font-size:12px;color:#888">${ev.name}</span>
      </td>
      <td>${ev.desc}</td>
      <td>
        <div class="url-pattern">${escapeHtml(pattern)}</div>
        ${found ? `
          <div class="url-list">
            <details>
              <summary>${urls.length}件のURL</summary>
              <ul>${urls.map(u => `<li>${escapeHtml(u)}</li>`).join('')}</ul>
            </details>
          </div>
        ` : ''}
      </td>
      <td class="${found ? 'tag-found' : 'tag-missing'}">${found ? '設置あり' : '設置なし'}</td>
    `;
    tbody.appendChild(tr);
  }

  // Add unknown if any
  if (eventUrls['unknown'].length > 0) {
    const urls = eventUrls['unknown'];
    const pattern = findUrlPattern(urls, baseDomain);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <span class="event-badge badge-other">その他</span><br>
        <span style="font-size:12px;color:#888">不明なイベント</span>
      </td>
      <td>Criteoタグは検出されたがイベント種別が特定できないもの</td>
      <td>
        <div class="url-pattern">${escapeHtml(pattern)}</div>
        <div class="url-list">
          <details>
            <summary>${urls.length}件のURL</summary>
            <ul>${urls.map(u => `<li>${escapeHtml(u)}</li>`).join('')}</ul>
          </details>
        </div>
      </td>
      <td class="tag-found">設置あり</td>
    `;
    tbody.appendChild(tr);
  }

  document.getElementById('resultMeta').textContent =
    `対象サイト: ${baseDomain} ｜ 確認ページ数: ${visited.size} ｜ 確認日時: ${new Date().toLocaleString('ja-JP')}`;
  document.getElementById('resultSection').style.display = 'block';
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function exportCSV() {
  const rows = [['イベント', 'イベント名', '説明', '設置URLパターン', '設置状況']];
  const tbody = document.getElementById('resultBody');
  for (const tr of tbody.querySelectorAll('tr')) {
    const cells = tr.querySelectorAll('td');
    const event = cells[0].textContent.trim().split('\n')[0].trim();
    const name = cells[0].textContent.trim().split('\n').pop().trim();
    const desc = cells[1].textContent.trim();
    const pattern = cells[2].querySelector('.url-pattern').textContent.trim();
    const status = cells[3].textContent.trim();
    rows.push([event, name, desc, pattern, status]);
  }

  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(c => `"${c.replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `criteo_tag_check_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// Allow Enter key to start
document.getElementById('siteUrl').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startCrawl();
});
